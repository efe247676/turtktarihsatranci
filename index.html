    <style>
      html, body {
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-text-size-adjust: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1c1917;
        color: #f8f4e3;
      }
      /* Splash screen — manifest yüklenene kadar gösterilecek */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1c1917 0%, #44403c 50%, #064e3b 100%);
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      #app-splash.hide { opacity: 0; pointer-events: none; }
      .splash-logo {
        font-size: 3rem;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen (JS yüklenene kadar) -->
    <div id="app-splash">
      <div class="splash-logo">♛ ⚔</div>
    </div>

    <div id="root"></div>

    <script>
      // Splash screen'i gizle (sayfa yüklendikten sonra)
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('app-splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(function() { splash.remove(); }, 600);
          }
        }, 100);
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
