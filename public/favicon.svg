<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="50%" stop-color="#44403c"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
  </defs>
  <!-- Arka plan -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Taç (vezir/şah) -->
  <g transform="translate(50, 55)">
    <!-- Taç gövdesi -->
    <path d="M -28 -10 L -28 5 L 28 5 L 28 -10 L 22 -25 L 14 -10 L 7 -28 L 0 -10 L -7 -28 L -14 -10 L -22 -25 Z"
          fill="url(#crown)" stroke="#78350f" stroke-width="2" stroke-linejoin="round"/>
    <!-- Mücevherler -->
    <circle cx="-15" cy="-15" r="3" fill="#dc2626"/>
    <circle cx="0" cy="-18" r="3.5" fill="#2563eb"/>
    <circle cx="15" cy="-15" r="3" fill="#16a34a"/>
    <!-- Alt kısım -->
    <rect x="-30" y="5" width="60" height="3" fill="#78350f"/>
    <!-- Kılıç (çapraz) -->
    <line x1="-22" y1="20" x2="22" y2="-2" stroke="#fde047" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="20" x2="-22" y2="-2" stroke="#fde047" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="9" r="3" fill="#fde047"/>
  </g>
</svg>
